<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Kurban</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            /* Mengizinkan scrolling penuh secara halus di perangkat mobile */
            overflow: auto; 
            -webkit-overflow-scrolling: touch;
            background-color: #f4f7f6;
        }
        
        .container {
            width: 100%;
            /* Menggunakan min-height agar kontainer bisa memanjang jika konten dalam iframe sangat tinggi */
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        
        iframe {
            width: 100%;
            /* Menggunakan flex-grow agar tinggi iframe otomatis mengisi sisa ruang yang tersedia tanpa terpotong */
            flex-grow: 1; 
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbwy3wlb-bBNwQCwDjpZg7emDIpfcBH9IgLBQXnmYwXBvAX_6XCFHcf5OGLsl8y8uWzE/exec" 
            allow="camera; microphone; autoplay; encrypted-media; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
