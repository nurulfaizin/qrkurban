<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Kurban | Presensi Kurban Masjid Nurul Faizin</title>
	<link rel="icon" type="image/png" href="favicon.png">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            /* Mengizinkan scrolling penuh secara halus di perangkat mobile */
            overflow: auto; 
            -webkit-overflow-scrolling: touch;
            background-color: #f4f7f6;
        }
        
        .container {
            width: 100%;
            /* Menggunakan min-height agar kontainer bisa memanjang jika konten dalam iframe sangat tinggi */
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        
        iframe {
            width: 100%;
            /* Menggunakan flex-grow agar tinggi iframe otomatis mengisi sisa ruang yang tersedia tanpa terpotong */
            flex-grow: 1; 
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycby0zVf155fNTcp8rcGgyJcsyihjBEKfVERFeHRUdTnFpPoUKO0xbF2p-UzWXThluWDR/exec" 
            allow="camera; microphone; autoplay; encrypted-media; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
